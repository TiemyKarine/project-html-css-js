<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Rock, Paper, Scissor</title>
</head>
<body>
    <h1>Rock Paper Scissors</h1>

<!--Rock paper scissors-->
    <div class="choices">
        <div class="choice-on" id="rock">
            <img src="./img/rock.jpg" alt="Rock">
        </div>

        <div class="choice-on" id="paper">
            <img src="./img/paper.jpg" alt="Paper">
        </div>

        <div class="choice-on" id="scissors">
            <img src="./img/scissors.jpg" alt="Scissors">
        </div>
    </div>

<!--scores-->

    <div class="score-board">
        <div class="score">
            <p id="user">Player: 0 </p>
            <br>
            <p>You</p>
        </div>

        <div class="score">
            <p id="comp">Player: 0 </p>
            <br>
            <p> Computer</p>
        </div>
    </div>

<!--result-->

    <div class="result">
        <p id="result-on">Play your move</p>
    </div>

    <script src="script.js"></script>   

</body>
</html>
